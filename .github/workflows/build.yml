name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 pyinstaller Pillow requests beautifulsoup4 pynput

      - name: Generate icon
        run: python make_icon.py

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --noupx --name "GitNoteEditor" --icon=icon.ico --add-data "icon.png;." --hidden-import requests --hidden-import beautifulsoup4 --hidden-import bs4 --hidden-import lxml --hidden-import PIL --hidden-import PIL.Image --hidden-import PIL.ImageQt --hidden-import pynput --hidden-import pynput.keyboard --hidden-import pynput.mouse --hidden-import urllib3 --hidden-import charset_normalizer --hidden-import certifi --hidden-import idna --clean main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitNoteEditor-Windows
          path: dist/GitNoteEditor.exe
