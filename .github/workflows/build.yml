name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 pyinstaller Pillow requests beautifulsoup4 pynput lxml

      - name: Generate icon
        run: python make_icon.py

      - name: Build EXE
        run: pyinstaller GitNoteEditor.spec --clean --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitNoteEditor-Windows
          path: dist/GitNoteEditor.exe
