name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 pyinstaller

      - name: Convert PNG to ICO
        run: |
          python -c "
from PIL import Image
img = Image.open('icon.png')
img.save('icon.ico', format='ICO', sizes=[(48,48),(32,32),(16,16)])
print('ICO created')
"

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --noupx --name "GitNoteEditor" --icon=icon.ico --add-data "icon.png;." --hidden-import PyQt5 --hidden-import PyQt5.QtCore --hidden-import PyQt5.QtGui --hidden-import PyQt5.QtWidgets --clean main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitNoteEditor-Windows
          path: dist/GitNoteEditor.exe
